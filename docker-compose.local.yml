volumes:
  open_llm_eval_lab_local_postgres_data: {}
  open_llm_eval_lab_local_postgres_data_backups: {}
  open_llm_eval_lab_local_redis_data: {}

services:
  django: &django
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
    image: open_llm_eval_lab_local_django
    container_name: open_llm_eval_lab_local_django
    depends_on:
      - postgres
      - redis
      - mailpit
    volumes:
      - /app/.venv
      - .:/app:z
    env_file:
      - ./.envs/.local/.django
      - ./.envs/.local/.postgres
    ports:
      - '8000:8000'
    command: /start

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    image: open_llm_eval_lab_local_frontend
    container_name: open_llm_eval_lab_local_frontend
    depends_on:
      - django
    volumes:
      - ./frontend:/app:z
      - /app/node_modules
    ports:
      - '5173:5173'

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    image: open_llm_eval_lab_production_postgres
    container_name: open_llm_eval_lab_local_postgres
    volumes:
      - open_llm_eval_lab_local_postgres_data:/var/lib/postgresql/data
      - open_llm_eval_lab_local_postgres_data_backups:/backups
    env_file:
      - ./.envs/.local/.postgres

  mailpit:
    image: docker.io/axllent/mailpit:latest
    container_name: open_llm_eval_lab_local_mailpit
    ports:
      - "8025:8025"

  redis:
    image: docker.io/redis:8.6
    container_name: open_llm_eval_lab_local_redis
    volumes:
      - open_llm_eval_lab_local_redis_data:/data

  celeryworker:
    <<: *django
    image: open_llm_eval_lab_local_celeryworker
    container_name: open_llm_eval_lab_local_celeryworker
    depends_on:
      - redis
      - postgres
      - mailpit
    ports: []
    command: /start-celeryworker

  celerybeat:
    <<: *django
    image: open_llm_eval_lab_local_celerybeat
    container_name: open_llm_eval_lab_local_celerybeat
    depends_on:
      - redis
      - postgres
      - mailpit
    ports: []
    command: /start-celerybeat

  flower:
    <<: *django
    image: open_llm_eval_lab_local_flower
    container_name: open_llm_eval_lab_local_flower
    ports:
      - '5555:5555'
    command: /start-flower
